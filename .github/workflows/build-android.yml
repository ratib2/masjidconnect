name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27c
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_GIT_STATUS: 1

      - name: Patch build.gradle for SDK 35 and 16kB pages
        run: |
          node -e "
          const fs = require('fs');
          let g = fs.readFileSync('android/app/build.gradle', 'utf8');
          // Fix compileSdkVersion and targetSdkVersion to 35
          g = g.replace(/compileSdkVersion\s*=\s*Integer\.parseInt\([^)]+\)/g, 'compileSdkVersion = 35');
          g = g.replace(/targetSdkVersion\s*=\s*Integer\.parseInt\([^)]+\)/g, 'targetSdkVersion = 35');
          g = g.replace(/compileSdk\s+\d+/g, 'compileSdk 35');
          g = g.replace(/targetSdk\s+\d+/g, 'targetSdk 35');
          // Add 16kB page size support in packagingOptions
          if (!g.includes('useLegacyPackaging')) {
            g = g.replace(/android\s*\{/, 'android {\n    packagingOptions {\n        jniLibs.useLegacyPackaging = false\n    }');
          }
          fs.writeFileSync('android/app/build.gradle', g);
          console.log('build.gradle patched');
          "
          grep -n "compileSdk\|targetSdk\|useLegacyPackaging" android/app/build.gradle

      - name: Copy Keystore
        run: cp $GITHUB_WORKSPACE/masjidconnect.keystore $GITHUB_WORKSPACE/android/app/masjidconnect.keystore

      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/masjidconnect.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: masjidconnect-release
          path: android/app/build/outputs/bundle/release/app-release.aab
